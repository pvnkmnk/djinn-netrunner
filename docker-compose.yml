version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: netrunner-postgres
    environment:
      POSTGRES_DB: musicops
      POSTGRES_USER: musicops
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./ops/db/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U musicops"]
      interval: 10s
      timeout: 5s
      retries: 5

  ops-web:
    build:
      context: ./ops/web
      dockerfile: Dockerfile
    container_name: netrunner-ops-web
    environment:
      DATABASE_URL: postgresql://musicops:${POSTGRES_PASSWORD:-changeme}@postgres:5432/musicops
      SLSKD_URL: http://slskd:5030
      SLSKD_API_KEY: ${SLSKD_API_KEY}
      GONIC_URL: http://gonic:4747
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
    volumes:
      - ./ops/web:/app
      - download-staging:/downloads
      - music-library:/music
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ops-worker:
    build:
      context: ./ops/worker
      dockerfile: Dockerfile
    container_name: netrunner-ops-worker
    environment:
      DATABASE_URL: postgresql://musicops:${POSTGRES_PASSWORD:-changeme}@postgres:5432/musicops
      SLSKD_URL: http://slskd:5030
      SLSKD_API_KEY: ${SLSKD_API_KEY}
      DOWNLOAD_STAGING: /downloads
      MUSIC_LIBRARY: /music
      WORKER_ID: ${HOSTNAME:-worker-1}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
    volumes:
      - ./ops/worker:/app
      - download-staging:/downloads
      - music-library:/music
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  slskd:
    image: slskd/slskd:latest
    container_name: netrunner-slskd
    environment:
      SLSKD_SLSK_USERNAME: ${SLSKD_USERNAME}
      SLSKD_SLSK_PASSWORD: ${SLSKD_PASSWORD}
      SLSKD_REMOTE_CONFIGURATION: "true"
    volumes:
      - slskd-data:/app
      - download-staging:/downloads
    ports:
      - "5030:5030"
      - "50300:50300"
    restart: unless-stopped

  gonic:
    image: sentriz/gonic:latest
    container_name: netrunner-gonic
    environment:
      GONIC_DB_PATH: /data/gonic.db
      GONIC_MUSIC_PATH: /music
      GONIC_PODCAST_PATH: /podcasts
      GONIC_CACHE_PATH: /cache
    volumes:
      - gonic-data:/data
      - gonic-cache:/cache
      - music-library:/music:ro
      - podcasts:/podcasts
    ports:
      - "4747:4747"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: netrunner-caddy
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./ops/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    depends_on:
      - ops-web
      - gonic
    restart: unless-stopped

volumes:
  postgres-data:
  slskd-data:
  gonic-data:
  gonic-cache:
  download-staging:
  music-library:
  podcasts:
  caddy-data:
  caddy-config:
