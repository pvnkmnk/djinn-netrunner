services:
  postgres:
    image: postgres:16-alpine
    container_name: netrunner-postgres
    environment:
      POSTGRES_DB: musicops
      POSTGRES_USER: musicops
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - netrunner-postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U musicops"]
      interval: 10s
      timeout: 5s
      retries: 5

  slskd:
    image: slskd/slskd:latest
    container_name: netrunner-slskd
    environment:
      SLSKD_SLSK_USERNAME: ${SLSKD_USERNAME}
      SLSKD_SLSK_PASSWORD: ${SLSKD_PASSWORD}
      SLSKD_REMOTE_CONFIGURATION: "true"
    volumes:
      - netrunner-slskd-data:/app
      - netrunner-downloads:/downloads
    ports:
      - "5030:5030"
      - "50300:50300"
    restart: unless-stopped

  gonic:
    image: sentriz/gonic:latest
    container_name: netrunner-gonic
    environment:
      GONIC_DB_PATH: /data/gonic.db
      GONIC_MUSIC_PATH: /music
      GONIC_PODCAST_PATH: /podcasts
      GONIC_CACHE_PATH: /cache
    volumes:
      - netrunner-gonic-data:/data
      - netrunner-gonic-cache:/cache
      - netrunner-music:/music:ro
      - netrunner-podcasts:/podcasts
    ports:
      - "4747:4747"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: netrunner-caddy
    volumes:
      - ./ops/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - netrunner-caddy-data:/data
      - netrunner-caddy-config:/config
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    depends_on:
      - netrunner
      - gonic
    restart: unless-stopped

  netrunner:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: netrunner
    environment:
      DATABASE_URL: postgresql://musicops:${POSTGRES_PASSWORD:-changeme}@postgres:5432/musicops?sslmode=disable
      SLSKD_URL: http://netrunner-slskd:5030
      SLSKD_API_KEY: ${SLSKD_API_KEY}
      GONIC_URL: http://netrunner-gonic:4747
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
      PORT: "8080"
      STATIC_FILES_PATH: /app/static
      TEMPLATES_PATH: /app/templates
      DOWNLOAD_STAGING: /app/downloads
      MUSIC_LIBRARY: /app/music
      WORKER_ID: ${HOSTNAME:-netrunner-1}
    volumes:
      - netrunner-config:/app/config
      - netrunner-logs:/app/logs
      - netrunner-downloads:/app/downloads
      - netrunner-music:/app/music
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      slskd:
        condition: service_started
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  netrunner-postgres-data:
  netrunner-slskd-data:
  netrunner-gonic-data:
  netrunner-gonic-cache:
  netrunner-caddy-data:
  netrunner-caddy-config:
  netrunner-config:
  netrunner-logs:
  netrunner-downloads:
  netrunner-music:
  netrunner-podcasts:
