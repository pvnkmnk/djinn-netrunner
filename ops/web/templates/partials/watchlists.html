<div class="watchlists-region">
    <div class="section-header">
        <h2>Watchlists</h2>
        <button class="btn btn-primary" hx-get="/partials/watchlist-form" hx-target="#modal-container" hx-swap="innerHTML">
            Add Watchlist
        </button>
    </div>
    
    <div id="watchlists-list">
    {% for watchlist in watchlists %}
    <div class="watchlist-card" id="watchlist-{{ watchlist.ID }}">
        <div class="watchlist-info">
            <div class="name">{{ watchlist.Name }}</div>
            <div class="source">{{ watchlist.SourceType }}: {{ watchlist.SourceURI }}</div>
        </div>
        <div class="actions">
            <button class="btn btn-sm" hx-post="/api/watchlists/{{ watchlist.ID }}/sync" hx-target="#console-logs" aria-label="Sync watchlist {{ watchlist.Name }}">
                Sync
            </button>
            <button class="btn btn-sm" hx-get="/api/watchlists/{{ watchlist.ID }}/preview" hx-target="#watchlist-preview-{{ watchlist.ID }}" hx-swap="innerHTML" type="button" aria-label="Preview watchlist {{ watchlist.Name }}">
                Preview
            </button>
            <button class="btn btn-sm" hx-get="/partials/watchlist-form?id={{ watchlist.ID }}" hx-target="#modal-container" hx-swap="innerHTML" aria-label="Edit watchlist {{ watchlist.Name }}">
                Edit
            </button>
            <button class="btn btn-sm btn-danger" hx-delete="/api/watchlists/{{ watchlist.ID }}" hx-target="#watchlist-{{ watchlist.ID }}" hx-swap="outerHTML" hx-confirm="Are you sure you want to delete watchlist '{{ watchlist.Name }}'?" aria-label="Delete watchlist {{ watchlist.Name }}">
                Delete
            </button>
            <label class="toggle">
                <input type="checkbox" {% if watchlist.Enabled %}checked{% endif %} 
                    hx-patch="/api/watchlists/{{ watchlist.ID }}/toggle"
                    hx-target="#watchlist-{{ watchlist.ID }}"
                    hx-swap="outerHTML"
                    aria-label="Toggle {{ watchlist.Name }}">
                <span class="toggle-slider"></span>
            </label>
        </div>
        <div id="watchlist-preview-{{ watchlist.ID }}" class="watchlist-preview"></div>
    </div>
    {% else %}
    <p class="empty-state">No watchlists configured</p>
    {% endfor %}
    </div>
</div>

<!-- Modal container for forms -->
<div id="modal-container"></div>
