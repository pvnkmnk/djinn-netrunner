<div class="modal-overlay" data-close-modal>
    <div class="modal">
        <div class="modal-header">
            <h3>{% if ID %}Edit{% else %}Add{% endif %} Watchlist</h3>
            <button class="modal-close" data-close-modal aria-label="Close modal">&times;</button>
        </div>
        <form hx-post="/api/watchlists" hx-target="#watchlists-list" hx-swap="outerHTML">
            {% if ID %}<input type="hidden" name="id" value="{{ ID }}">{% endif %}
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" value="{{ Name | escape }}" required>
            </div>
            <div class="form-group">
                <label for="source_type">Source Type</label>
                <select id="source_type" name="source_type" required>
                    <optgroup label="Spotify">
                        <option value="spotify_playlist" {% if SourceType == "spotify_playlist" %}selected{% endif %}>Spotify Playlist</option>
                        <option value="spotify_liked" {% if SourceType == "spotify_liked" %}selected{% endif %}>Spotify Liked Songs</option>
                        <option value="spotify_discover" {% if SourceType == "spotify_discover" %}selected{% endif %}>Spotify Discover / Mixes</option>
                    </optgroup>
                    <optgroup label="Last.fm">
                        <option value="lastfm_loved" {% if SourceType == "lastfm_loved" %}selected{% endif %}>Last.fm Loved Tracks</option>
                        <option value="lastfm_top" {% if SourceType == "lastfm_top" %}selected{% endif %}>Last.fm Top Tracks</option>
                    </optgroup>
                    <optgroup label="Other Services">
                        <option value="listenbrainz_listens" {% if SourceType == "listenbrainz_listens" %}selected{% endif %}>ListenBrainz Listens</option>
                        <option value="discogs_wantlist" {% if SourceType == "discogs_wantlist" %}selected{% endif %}>Discogs Wantlist</option>
                        <option value="lidarr_wanted" {% if SourceType == "lidarr_wanted" %}selected{% endif %}>Lidarr Wanted</option>
                        <option value="rss_feed" {% if SourceType == "rss_feed" %}selected{% endif %}>RSS Feed</option>
                    </optgroup>
                    <optgroup label="Local">
                        <option value="local_file" {% if SourceType == "local_file" %}selected{% endif %}>Local File</option>
                        <option value="local_directory" {% if SourceType == "local_directory" %}selected{% endif %}>Local Directory</option>
                    </optgroup>
                </select>
            </div>
            <div class="form-group">
                <label for="source_uri">Source URI</label>
                <input type="text" id="source_uri" name="source_uri" value="{{ SourceURI | escape }}" required>
                <small id="source_hint" class="form-hint"></small>
            </div>
            <div class="form-group">
                <label for="quality_profile_id">Quality Profile</label>
                <select id="quality_profile_id" name="quality_profile_id">
                    <option value="">Default</option>
                    {% for profile in profiles %}
                    <option value="{{ profile.ID }}" {% if profile.ID == QualityProfileID %}selected{% endif %}>{{ profile.Name | escape }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="enabled" {% if Enabled %}checked{% endif %}>
                    <span>Enabled</span>
                </label>
            </div>
            <div class="form-actions">
                <button type="button" class="btn" data-close-modal>Cancel</button>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
    </div>
</div>
