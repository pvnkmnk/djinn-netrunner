<div class="modal-overlay" data-close-modal>
    <div class="modal">
        <div class="modal-header">
            <h3>Add Artist</h3>
            <button class="modal-close" data-close-modal>&times;</button>
        </div>
        <form hx-post="/api/artists" hx-target="#artists-list" hx-swap="outerHTML" hx-on:submit="if(event.detail.successful) closeModal()">
            <div class="form-group">
                <label for="name">Artist Name</label>
                <input type="text" id="name" name="name" required placeholder="Enter artist name">
            </div>
            <div class="form-group">
                <label for="quality_profile_id">Quality Profile</label>
                <select id="quality_profile_id" name="quality_profile_id">
                    <option value="">Default</option>
                    {% for profile in profiles %}
                    <option value="{{ profile.ID }}">{{ profile.Name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-actions">
                <button type="button" class="btn" data-close-modal>Cancel</button>
                <button type="submit" class="btn btn-primary">Add</button>
            </div>
        </form>
    </div>
</div>
