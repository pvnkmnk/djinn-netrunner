<div class="modal-overlay" id="modal-overlay" 
     hx-on:click="if(event.target === this) { htmx.removeClass(htmx.find('#modal-container'), 'active'); htmx.find('#modal-container').innerHTML = '' }">
    <div class="modal">
        <div class="modal-header">
            <h3>Add Artist</h3>
            <button class="modal-close" hx-on:click="htmx.removeClass(htmx.find('#modal-container'), 'active'); htmx.find('#modal-container').innerHTML = ''">&times;</button>
        </div>
        <form hx-post="/api/artists" hx-target="#artists-list" hx-swap="outerHTML" hx-on:submit="if(event.detail.successful) { htmx.removeClass(htmx.find('#modal-container'), 'active'); htmx.find('#modal-container').innerHTML = '' }">
            <div class="form-group">
                <label for="name">Artist Name</label>
                <input type="text" id="name" name="name" required placeholder="Enter artist name">
            </div>
            <div class="form-group">
                <label for="quality_profile_id">Quality Profile</label>
                <select id="quality_profile_id" name="quality_profile_id">
                    <option value="">Default</option>
                    {{ range .profiles }}
                    <option value="{{ .ID }}">{{ .Name }}</option>
                    {{ end }}
                </select>
            </div>
            <div class="form-actions">
                <button type="button" class="btn" hx-on:click="htmx.removeClass(htmx.find('#modal-container'), 'active'); htmx.find('#modal-container').innerHTML = ''">Cancel</button>
                <button type="submit" class="btn btn-primary">Add</button>
            </div>
        </form>
    </div>
</div>

<style>
#modal-container {
    display: none;
}
#modal-container.active {
    display: block;
}
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}
.modal {
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    width: 100%;
    max-width: 500px;
    max-height: 90vh;
    overflow-y: auto;
}
.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem;
    border-bottom: 1px solid var(--border-color);
}
.modal-header h3 {
    margin: 0;
}
.modal-close {
    background: none;
    border: none;
    color: var(--text-secondary);
    font-size: 1.5rem;
    cursor: pointer;
}
.modal form {
    padding: 1rem;
}
.form-group {
    margin-bottom: 1rem;
}
.form-group label {
    display: block;
    margin-bottom: 0.375rem;
    font-size: 0.875rem;
    color: var(--text-secondary);
}
.form-group input, 
.form-group select {
    width: 100%;
    padding: 0.5rem;
    background: var(--bg-primary);
    border: 1px solid var(--border-color);
    border-radius: 4px;
    color: var(--text-primary);
}
.form-group input:focus,
.form-group select:focus {
    outline: none;
    border-color: var(--accent-primary);
}
.form-actions {
    display: flex;
    gap: 0.5rem;
    justify-content: flex-end;
    margin-top: 1.5rem;
}
.btn-primary {
    background: var(--accent-primary);
    border-color: var(--accent-primary);
}
.btn-primary:hover {
    opacity: 0.9;
}
</style>
