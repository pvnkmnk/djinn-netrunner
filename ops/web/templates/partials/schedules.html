<div class="schedules-region">
    <div class="section-header">
        <h2>Schedules</h2>
        <button class="btn btn-primary" hx-get="/api/schedules/form" hx-target="#modal-container" hx-swap="innerHTML">
            Add Schedule
        </button>
    </div>
    
    <div id="schedules-list">
    {% for schedule in schedules %}
    <div class="schedule-card" id="schedule-{{ schedule.ID }}">
        <div class="schedule-info">
            <div class="name">
                {{ schedule.Watchlist.Name }}
                {% if not schedule.Enabled %}<span class="badge badge-disabled">Disabled</span>{% endif %}
            </div>
            <div class="details">
                <span>Cron: {{ schedule.CronExpr }}</span>
                 <span>Next: {{ schedule.NextRunAt | date:"Jan 02 15:04" }}</span>
            </div>
        </div>
        <div class="actions">
            <button class="btn btn-sm" hx-patch="/api/schedules/{{ schedule.ID }}/toggle" hx-target="#schedule-{{ schedule.ID }}" hx-swap="outerHTML">
                {% if schedule.Enabled %}Disable{% else %}Enable{% endif %}
            </button>
            <button class="btn btn-sm" hx-get="/api/schedules/form?id={{ schedule.ID }}" hx-target="#modal-container" hx-swap="innerHTML">
                Edit
            </button>
            <button class="btn btn-sm btn-danger" hx-delete="/api/schedules/{{ schedule.ID }}" hx-target="#schedule-{{ schedule.ID }}" hx-swap="outerHTML">
                Delete
            </button>
        </div>
    </div>
    {% empty %}
    <p class="empty-state">No schedules configured</p>
    {% endfor %}
    </div>
</div>

<div id="modal-container"></div>
