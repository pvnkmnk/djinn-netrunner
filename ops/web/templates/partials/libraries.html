<div class="libraries-region">
    <div class="section-header">
        <h2>Libraries</h2>
        <button class="btn btn-primary" hx-get="/api/libraries/form" hx-target="#modal-container" hx-swap="innerHTML">
            Add Library
        </button>
    </div>
    
    <div id="libraries-list">
    {% for library in libraries %}
    <div class="library-card" id="library-{{ library.ID }}">
        <div class="library-info">
            <div class="name">{{ library.Name }}</div>
            <div class="path">{{ library.Path }}</div>
        </div>
        <div class="actions">
            <button class="btn btn-sm" hx-post="/api/libraries/{{ library.ID }}/scan" hx-target="#console-logs" aria-label="Scan library {{ library.Name }}">
                Scan
            </button>
            <button class="btn btn-sm" hx-post="/api/libraries/{{ library.ID }}/enrich" hx-target="#console-logs" aria-label="Enrich library {{ library.Name }}">
                Enrich
            </button>
            <button class="btn btn-sm" hx-get="/api/libraries/form?id={{ library.ID }}" hx-target="#modal-container" hx-swap="innerHTML" aria-label="Edit library {{ library.Name }}">
                Edit
            </button>
            <button class="btn btn-sm btn-danger" hx-delete="/api/libraries/{{ library.ID }}" hx-target="#library-{{ library.ID }}" hx-swap="outerHTML" hx-confirm="Are you sure you want to delete the library '{{ library.Name }}'?" aria-label="Delete library {{ library.Name }}">
                Delete
            </button>
        </div>
    </div>
    {% empty %}
    <p class="empty-state">No libraries configured</p>
    {% endfor %}
    </div>
</div>

<div id="modal-container"></div>
