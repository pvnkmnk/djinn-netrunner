<div class="modal-overlay" data-close-modal>
    <div class="modal">
        <div class="modal-header">
            <h3>New Acquisition</h3>
            <button class="modal-close" data-close-modal aria-label="Close modal">&times;</button>
        </div>
        {% if error %}
        <div class="form-error">{{ error }}</div>
        {% endif %}
        <form hx-post="/api/acquire" hx-target="#jobs-region" hx-swap="innerHTML">
            <div class="form-group">
                <label for="artist">Artist</label>
                <input type="text" id="artist" name="artist" required placeholder="e.g. Radiohead" value="{{ artist }}">
            </div>
            <div class="form-group">
                <label for="album">Album</label>
                <input type="text" id="album" name="album" placeholder="e.g. OK Computer (leave blank for single track)" value="{{ album }}">
            </div>
            <div class="form-group">
                <label for="title">Track Title</label>
                <input type="text" id="title" name="title" placeholder="e.g. Paranoid Android (leave blank for full album)" value="{{ title }}">
            </div>
            <p class="text-secondary">Provide artist + album for album acquisition, or artist + title for a single track.</p>
            <div class="form-group">
                <label for="quality_profile_id">Quality Profile</label>
                <select id="quality_profile_id" name="quality_profile_id">
                    <option value="">Default</option>
                    {% for profile in profiles %}
                    <option value="{{ profile.ID }}">{{ profile.Name | escape }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-actions">
                <button type="button" class="btn" data-close-modal>Cancel</button>
                <button type="submit" class="btn btn-primary">Acquire</button>
            </div>
        </form>
    </div>
</div>
