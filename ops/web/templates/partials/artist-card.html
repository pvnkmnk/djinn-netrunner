<div class="artist-card" id="artist-{{ Artist.ID }}">
    <div class="artist-info">
        <div class="name">
            {{ Artist.Name }}
            {% if not Artist.Monitored %}<span class="badge badge-disabled">Paused</span>{% endif %}
        </div>
        <div class="details">
            <span>MBID: {{ Artist.MusicBrainzID }}</span>
            <span>Releases: {{ Artist.AcquiredReleases }}/{{ Artist.TotalReleases }}</span>
             <span>Last Scan: {{ Artist.LastScanDate | date:"Jan 02 15:04" }}</span>
        </div>
    </div>
    <div class="actions">
        <button class="btn btn-sm" hx-patch="/api/artists/{{ Artist.ID }}" hx-target="#artist-{{ Artist.ID }}" hx-swap="outerHTML" aria-label="{% if Artist.Monitored %}Pause monitoring for {{ Artist.Name }}{% else %}Resume monitoring for {{ Artist.Name }}{% endif %}">
            {% if Artist.Monitored %}Pause{% else %}Resume{% endif %}
        </button>
        <button class="btn btn-sm btn-danger" hx-delete="/api/artists/{{ Artist.ID }}" hx-target="#artist-{{ Artist.ID }}" hx-swap="outerHTML" hx-confirm="Are you sure you want to remove {{ Artist.Name }}?" aria-label="Remove {{ Artist.Name }} from monitoring">
            Remove
        </button>
    </div>
</div>
