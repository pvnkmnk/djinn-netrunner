<div class="jobs-region">
    <div class="filters" hx-get="/partials/jobs" hx-target="#jobs-list" hx-trigger="change">
        <select name="job_type">
            <option value="">All Types</option>
            <option value="sync">Sync</option>
            <option value="scan">Scan</option>
            <option value="acquisition">Acquisition</option>
            <option value="enrich">Enrich</option>
        </select>
        <select name="state">
            <option value="">All States</option>
            <option value="queued">Queued</option>
            <option value="running">Running</option>
            <option value="succeeded">Succeeded</option>
            <option value="failed">Failed</option>
        </select>
    </div>
    
    <div id="jobs-list">
    {% for job in jobs %}
    <div class="job-card" id="job-{{ job.ID }}">
        <div class="job-info">
            <div class="job-id">#{{ job.ID }}</div>
            <div class="job-type">{{ job.Type }}</div>
            <div class="job-state state-{{ job.State }}">{{ job.State }}</div>
        </div>
        <div class="job-meta">
            <span>{{ job.RequestedAt }}</span>
            <span>By: {{ job.CreatedBy }}</span>
        </div>
        <div class="actions">
            <button class="btn btn-sm" hx-get="/partials/job-logs?job_id={{ job.ID }}" hx-target="#job-logs-container" hx-swap="innerHTML">
                View Logs
            </button>
            {% if job.State == "queued" %}
            <button class="btn btn-sm btn-danger" hx-delete="/api/jobs/{{ job.ID }}" hx-target="#job-{{ job.ID }}" hx-swap="outerHTML" hx-confirm="Are you sure you want to cancel this job?">
                Cancel
            </button>
            {% endif %}
        </div>
    </div>
    {% empty %}
    <p class="empty-state">No jobs found</p>
    {% endfor %}
    </div>
    
    <div id="job-logs-container"></div>
</div>
