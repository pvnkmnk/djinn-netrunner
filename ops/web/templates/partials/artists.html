<div class="artists-region">
    <div class="section-header">
        <h2>Monitored Artists</h2>
        <button class="btn btn-primary" hx-get="/partials/artist-form" hx-target="#modal-container" hx-swap="innerHTML" hx-on:htmx:after-request="if(event.detail.successful) htmx.addClass(htmx.find('#modal-container'), 'active')">
            Add Artist
        </button>
    </div>
    
    <div id="artists-list">
    {{ range .artists }}
    <div class="artist-card" id="artist-{{ .ID }}">
        <div class="artist-info">
            <div class="name">
                {{ .Name }}
                {{ if not .Monitored }}<span class="badge badge-disabled">Paused</span>{{ end }}
            </div>
            <div class="details">
                <span>MBID: {{ .MusicBrainzID }}</span>
                <span>Releases: {{ .AcquiredReleases }}/{{ .TotalReleases }}</span>
                <span>Last Scan: {{ .LastScanDate.Format "Jan 02 15:04" }}</span>
            </div>
        </div>
        <div class="actions">
            <button class="btn btn-sm" hx-patch="/api/artists/{{ .ID }}" hx-target="#artist-{{ .ID }}" hx-swap="outerHTML">
                {{ if .Monitored }}Pause{{ else }}Resume{{ end }}
            </button>
            <button class="btn btn-sm btn-danger" hx-delete="/api/artists/{{ .ID }}" hx-target="#artist-{{ .ID }}" hx-swap="outerHTML">
                Remove
            </button>
        </div>
    </div>
    {{ else }}
    <p class="empty-state">No artists being monitored</p>
    {{ end }}
    </div>
</div>

<div id="modal-container"></div>

<style>
.artist-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 6px;
    padding: 1rem;
    margin-bottom: 0.75rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.artist-info .name { font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
.artist-info .details { font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.25rem; }
.artist-info .details span { margin-right: 1rem; }
.badge-disabled {
    background: var(--text-secondary);
    color: white;
    font-size: 0.625rem;
    padding: 0.125rem 0.375rem;
    border-radius: 2px;
}
</style>
