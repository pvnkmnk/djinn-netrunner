<h3>Audit Log</h3>
<table class="admin-table">
    <thead>
        <tr>
            <th>Time</th>
            <th>Action</th>
            <th>Actor</th>
            <th>Target</th>
            <th>Details</th>
        </tr>
    </thead>
    <tbody>
        {% for entry in Entries %}
        <tr>
            <td>{{ entry.CreatedAt|date:"2006-01-02 15:04:05" }}</td>
            <td><code>{{ entry.Action|escape }}</code></td>
            <td>{{ entry.ActorID }}</td>
            <td>{{ entry.TargetType|escape }}: {{ entry.TargetID|escape }}</td>
            <td>{% if entry.Metadata %}<code>{{ entry.Metadata|escape }}</code>{% endif %}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
