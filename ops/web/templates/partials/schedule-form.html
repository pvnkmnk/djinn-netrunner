<div class="modal-overlay" data-close-modal>
    <div class="modal">
        <div class="modal-header">
            <h3>{% if ID %}Edit{% else %}Add{% endif %} Schedule</h3>
            <button class="modal-close" data-close-modal>&times;</button>
        </div>
        <form hx-post="/api/schedules" hx-target="#schedules-list" hx-swap="outerHTML" hx-on:submit="if(event.detail.successful) closeModal()">
            {% if ID %}<input type="hidden" name="id" value="{{ ID }}">{% endif %}
            <div class="form-group">
                <label for="watchlist_id">Watchlist</label>
                <select id="watchlist_id" name="watchlist_id" required>
                    {% for watchlist in watchlists %}
                    <option value="{{ watchlist.ID }}" {% if watchlist.ID == WatchlistID %}selected{% endif %}>{{ watchlist.Name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="cron_expr">Cron Expression</label>
                <input type="text" id="cron_expr" name="cron_expr" value="{{ CronExpr }}" required placeholder="0 6 * * *">
                <small style="color: var(--text-secondary);">Format: minute hour day month weekday</small>
            </div>
            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="enabled" {% if Enabled %}checked{% endif %}>
                    <span>Enabled</span>
                </label>
            </div>
            <div class="form-actions">
                <button type="button" class="btn" data-close-modal>Cancel</button>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
    </div>
</div>
