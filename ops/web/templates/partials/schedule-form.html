<div class="modal-overlay" id="modal-overlay" 
     hx-on:click="if(event.target === this) { htmx.removeClass(htmx.find('#modal-container'), 'active'); htmx.find('#modal-container').innerHTML = '' }">
    <div class="modal">
        <div class="modal-header">
            <h3>{{ if .ID }}Edit{{ else }}Add{{ end }} Schedule</h3>
            <button class="modal-close" hx-on:click="htmx.removeClass(htmx.find('#modal-container'), 'active'); htmx.find('#modal-container').innerHTML = ''">&times;</button>
        </div>
        <form hx-post="/api/schedules" hx-target="#schedules-list" hx-swap="outerHTML" hx-on:submit="if(event.detail.successful) { htmx.removeClass(htmx.find('#modal-container'), 'active'); htmx.find('#modal-container').innerHTML = '' }">
            {{ if .ID }}<input type="hidden" name="id" value="{{ .ID }}">{{ end }}
            <div class="form-group">
                <label for="watchlist_id">Watchlist</label>
                <select id="watchlist_id" name="watchlist_id" required>
                    {{ range .watchlists }}
                    <option value="{{ .ID }}" {{ if eq $.WatchlistID .ID }}selected{{ end }}>{{ .Name }}</option>
                    {{ end }}
                </select>
            </div>
            <div class="form-group">
                <label for="cron_expr">Cron Expression</label>
                <input type="text" id="cron_expr" name="cron_expr" value="{{ .CronExpr }}" required placeholder="0 6 * * *">
                <small style="color: var(--text-secondary);">Format: minute hour day month weekday</small>
            </div>
            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="enabled" {{ if .Enabled }}checked{{ end }}>
                    <span>Enabled</span>
                </label>
            </div>
            <div class="form-actions">
                <button type="button" class="btn" hx-on:click="htmx.removeClass(htmx.find('#modal-container'), 'active'); htmx.find('#modal-container').innerHTML = ''">Cancel</button>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
    </div>
</div>
