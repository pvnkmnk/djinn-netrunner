<div class="playlists-region">
    <div class="section-header">
        <h2>Playlists</h2>
        <button class="btn btn-primary" hx-post="/api/playlists" hx-vals='{"name": "New Playlist"}' hx-trigger="click" hx-target="#playlists-region" hx-swap="innerHTML" aria-label="Create new playlist">
            New Playlist
        </button>
    </div>

    <div id="playlists-list">
    {% for playlist in playlists %}
    <div class="playlist-card" id="playlist-{{ playlist.ID }}">
        <div class="playlist-info">
            <div class="name">{{ playlist.Name | escape }}</div>
            {% if playlist.Description %}
            <div class="description">{{ playlist.Description | escape }}</div>
            {% endif %}
            <div class="meta">
                {% if playlist.Public %}Public{% else %}Private{% endif %}
            </div>
        </div>
        <div class="actions">
            <button class="btn btn-sm btn-danger" hx-delete="/api/playlists/{{ playlist.ID }}" hx-target="#playlist-{{ playlist.ID }}" hx-swap="outerHTML" hx-confirm="Delete playlist {{ playlist.Name | escape }}?" aria-label="Delete playlist {{ playlist.Name | escape }}">
                Delete
            </button>
        </div>
    </div>
    {% empty %}
    <p class="empty-state">No playlists yet</p>
    <p class="text-secondary">Create a playlist to organize your tracks.</p>
    {% endfor %}
    </div>
</div>
