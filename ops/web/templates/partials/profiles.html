<div class="profiles-region">
    <div class="section-header">
        <h2>Quality Profiles</h2>
        <button class="btn btn-primary" hx-get="/partials/profile-form" hx-target="#modal-container" hx-swap="innerHTML">
            Add Profile
        </button>
    </div>
    
    <div id="profiles-list">
    {{ range .profiles }}
    <div class="profile-card" id="profile-{{ .ID }}">
        <div class="profile-info">
            <div class="name">
                {{ .Name }}
                {{ if .IsDefault }}<span class="badge">Default</span>{{ end }}
            </div>
            <div class="description">{{ .Description }}</div>
            <div class="details">
                <span>Lossless: {{ .PreferLossless }}</span>
                <span>Formats: {{ .AllowedFormats }}</span>
                <span>Min Bitrate: {{ .MinBitrate }}</span>
            </div>
        </div>
        <div class="actions">
            {{ if not .IsDefault }}
            <button class="btn btn-sm" hx-post="/api/profiles/{{ .ID }}/set-default" hx-target="#profiles-list" hx-swap="outerHTML">
                Set Default
            </button>
            {{ end }}
            <button class="btn btn-sm" hx-get="/partials/profile-form?id={{ .ID }}" hx-target="#modal-container" hx-swap="innerHTML">
                Edit
            </button>
            <button class="btn btn-sm btn-danger" hx-delete="/api/profiles/{{ .ID }}" hx-target="#profile-{{ .ID }}" hx-swap="outerHTML" hx-confirm="Are you sure you want to delete this profile?">
                Delete
            </button>
        </div>
    </div>
    {{ else }}
    <p class="empty-state">No profiles configured</p>
    {{ end }}
    </div>
</div>

<div id="modal-container"></div>

<style>
.profile-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 6px;
    padding: 1rem;
    margin-bottom: 0.75rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.profile-info .name { font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
.profile-info .description { color: var(--text-secondary); font-size: 0.875rem; margin: 0.25rem 0; }
.profile-info .details { font-size: 0.75rem; color: var(--text-secondary); }
.profile-info .details span { margin-right: 1rem; }
.badge {
    background: var(--accent-success);
    color: white;
    font-size: 0.625rem;
    padding: 0.125rem 0.375rem;
    border-radius: 2px;
    text-transform: uppercase;
}
</style>
