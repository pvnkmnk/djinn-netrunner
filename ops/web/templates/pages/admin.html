{% extends "layouts/base.html" %}

{% block title %}NETRUNNER — Admin{% endblock %}

{% block content %}
<div class="admin-dashboard">
    <h2>Admin Panel</h2>
    <nav class="admin-nav" aria-label="Admin sections">
        <a href="/admin" class="admin-nav-link"
           hx-get="/partials/admin/users"
           hx-target="#admin-content"
           hx-trigger="click"
           hx-push-url="true">Users</a>
        <a href="/admin/audit" class="admin-nav-link"
           hx-get="/partials/admin/audit"
           hx-target="#admin-content"
           hx-trigger="click"
           hx-push-url="true">Audit Log</a>
        <a href="/admin/config" class="admin-nav-link"
           hx-get="/partials/admin/config"
           hx-target="#admin-content"
           hx-trigger="click"
           hx-push-url="true">System Config</a>
    </nav>
    <div id="admin-content" class="admin-content">
        <!-- Loaded via HTMX -->
    </div>
</div>
{% endblock %}
