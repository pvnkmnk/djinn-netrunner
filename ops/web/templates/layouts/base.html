<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NETRUNNER{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="/static/js/htmx.min.js"></script>
    <script src="/static/js/app.js" defer></script>
</head>
<body>
    <header class="app-header">
        <h1>NETRUNNER</h1>
        <nav>
            <a href="/" {% if Page == "dashboard" %}class="active"{% endif %}>Dashboard</a>
            <a href="/watchlists" {% if Page == "watchlists" %}class="active"{% endif %}>Watchlists</a>
            <a href="/libraries" {% if Page == "libraries" %}class="active"{% endif %}>Libraries</a>
            <a href="/profiles" {% if Page == "profiles" %}class="active"{% endif %}>Profiles</a>
            <a href="/schedules" {% if Page == "schedules" %}class="active"{% endif %}>Schedules</a>
            <a href="/artists" {% if Page == "artists" %}class="active"{% endif %}>Artists</a>
            <a href="/jobs" {% if Page == "jobs" %}class="active"{% endif %}>Jobs</a>
        </nav>
    </header>
    <main class="app-main">
        {% block content %}{% endblock %}
    </main>
    <footer class="app-footer">
        NetRunner v1.0.0 | Music Acquisition Pipeline
    </footer>
</body>
</html>
