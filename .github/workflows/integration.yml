name: Integration Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  SLSKD_TEST_USERNAME: testuser
  SLSKD_TEST_PASSWORD: testpass
  SLSKD_TEST_API_KEY: test-api-key-for-integration
  INTEGRATION_DB_PASSWORD: testpass
  INTEGRATION_SLSKD_URL: http://localhost:15030
  INTEGRATION_SLSKD_API_KEY: test-api-key-for-integration
  INTEGRATION_DATABASE_URL: postgresql://testuser:testpass@localhost:15432/netrunner_integration?sslmode=disable

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Start integration services
        run: |
          docker compose -f docker-compose.integration.yml -p netrunner-integration up -d

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            if docker compose -f docker-compose.integration.yml -p netrunner-integration exec -T integration-db pg_isready -U testuser > /dev/null 2>&1; then
              echo "Postgres is ready"
              exit 0
            fi
            echo "Waiting for Postgres... ($i/30)"
            sleep 2
          done
          echo "Timed out waiting for Postgres"
          exit 1

      - name: Wait for slskd
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:15030/health > /dev/null 2>&1; then
              echo "slskd is ready"
              exit 0
            fi
            echo "Waiting for slskd... ($i/60)"
            sleep 2
          done
          echo "Timed out waiting for slskd"
          exit 1

      - name: Download dependencies
        working-directory: backend
        run: go mod download

      - name: Run integration tests
        working-directory: backend
        run: go test ./internal/integration/... -tags=integration -v -timeout=5m

      - name: Show service logs on failure
        if: failure()
        run: |
          echo "=== slskd logs ==="
          docker compose -f docker-compose.integration.yml -p netrunner-integration logs slskd-integration
          echo "=== postgres logs ==="
          docker compose -f docker-compose.integration.yml -p netrunner-integration logs integration-db

      - name: Tear down services
        if: always()
        run: |
          docker compose -f docker-compose.integration.yml -p netrunner-integration down -v
