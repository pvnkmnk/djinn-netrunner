name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Installs Go + govulncheck + linters from mise.toml [tools]
      - uses: jdx/mise-action@v4

      - name: Download dependencies
        working-directory: backend
        run: go mod download

      # Fast gates (parallel-safe, <1 min)
      - name: Vet
        run: mise run vet

      - name: Shell check
        run: mise run lint-shell

      - name: Secrets scan
        run: mise run detect-secrets

      # Build all binaries
      - name: Build
        run: mise run build

      # Tests with coverage
      - name: Test
        run: mise run test-coverage
        env:
          CGO_ENABLED: 0

      # Deep analysis (CI only — ~30-60s each)
      - name: Go lint
        run: mise run lint-go

      - name: Workflow lint
        run: mise run lint-actions

      - name: Vulnerability scan
        run: mise run vuln

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: backend/coverage.out
