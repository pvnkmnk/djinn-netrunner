name: PR-Sentry Deep Review

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: PR-Sentry AI Review
        if: ${{ secrets.DEEPSEEK_API_KEY != '' || secrets.ANTHROPIC_API_KEY != '' || secrets.OPENAI_API_KEY != '' }}
        uses: Ebuodinde/PR_SENTRY@v1
        continue-on-error: true
        with:
          provider: deepseek
          deepseek_api_key: ${{ secrets.DEEPSEEK_API_KEY }}
          locale: en

      - name: Skip notice
        if: ${{ secrets.DEEPSEEK_API_KEY == '' && secrets.ANTHROPIC_API_KEY == '' && secrets.OPENAI_API_KEY == '' }}
        run: |
          echo "::notice::PR-Sentry skipped: no LLM API key configured."
          echo "Set DEEPSEEK_API_KEY, ANTHROPIC_API_KEY, or OPENAI_API_KEY in repo secrets to enable."
