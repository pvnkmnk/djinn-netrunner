name: PR-Sentry Deep Review

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: PR-Sentry AI Review
        if: env.DEEPSEEK_API_KEY != ''
        uses: Ebuodinde/PR_SENTRY@35c89b2d5985060c1906fbf04ed4e9e450ca940e # v3.0.0
        continue-on-error: true
        with:
          provider: deepseek
          deepseek_api_key: ${{ secrets.DEEPSEEK_API_KEY }}
          locale: en

      - name: Skip notice
        if: env.DEEPSEEK_API_KEY == '' && env.ANTHROPIC_API_KEY == '' && env.OPENAI_API_KEY == ''
        run: |
          echo "::notice::PR-Sentry skipped: no LLM API key configured."
          echo "Set DEEPSEEK_API_KEY, ANTHROPIC_API_KEY, or OPENAI_API_KEY in repo secrets to enable."
