services:
  ops-web:
    ports:
      - "8080:8080"
    environment:
      # E2E tests make many auth requests; higher limit for testing
      AUTH_RATE_LIMIT_MAX: 1000
      # Use test database for E2E tests
      DATABASE_URL: postgresql://musicops:testpass@postgres:5432/musicops_test?sslmode=disable
      # Enable Subsonic API for E2E tests
      SUBSONIC_ENABLED: "true"
